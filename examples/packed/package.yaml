name: packed-th-natural
version: 1.0.0.0

default-extensions:
  - TemplateHaskell
  - RecordWildCards
  - MultiParamTypeClasses
  - LambdaCase

dependencies:
  - base
  - packed-data
  - template-haskell
  - template-haskell-natural
  - th-lenses

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src

tests:
  unit:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hspec
      - packed-th-natural
