name: template-haskell-natural
version: 1.0.0.0

default-extensions:
  - TemplateHaskell
  - RecordWildCards
  - MultiParamTypeClasses
  - LambdaCase
  - FunctionalDependencies
  - MultiParamTypeClasses
  - DeriveFunctor
  - KindSignatures
  - DataKinds
  - GeneralizedNewtypeDeriving
  - FlexibleInstances
  - FlexibleContexts

dependencies:
  - base
  - template-haskell

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-export-lists
  - -Wmissing-home-modules
  - -Wpartial-fields
  - -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
    - extract-cons
    - template-haskell-lenses
    - mtl
    - lens
tests:
  unit:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hspec
      - natural-th
